<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanya sekedar tugas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header>
    <h1>Tidak Istimewa</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- HOME -->
  <section id="home" class="section">
    <h2>Selamat Datang</h2>
    <p>Ini adalah contoh website sederhana menggunakan HTML, CSS, dan JavaScript.</p>
    <button onclick="ubahTeks()">Klik Saya</button>
    <p id="demoText"></p>
  </section>

  <!-- ABOUT -->
  <section id="about" class="section">
    <h2>Tentang</h2>
    <p>Website ini dibuat untuk tugas front-end dasar.</p>
  </section>

  <!-- CONTACT FORM -->
  <section id="contact" class="section">
    <h2>Contact Form</h2>

    <form id="contactForm">
      <input type="text" id="name" placeholder="Nama">
      <input type="email" id="email" placeholder="Email">
      <textarea id="message" placeholder="Pesan"></textarea>
      <button type="submit">Kirim</button>
    </form>

    <p id="status"></p>
  </section>

  <footer>
    <p>&copy; 2026 Website Tugas</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
